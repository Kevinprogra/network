<ion-content class="auth-content">
  <section class="auth-shell">
    <div class="auth-card">
      <header class="card-header">
        <p class="eyebrow">Crear cuenta</p>

        <div class="brand-mark logo-shell" aria-hidden="true">
          <div class="brand-glow"></div>
          <img
            class="logo-image"
            src="assets/login/icon.png"
            alt="Logo SocializaUni" />
        </div>

        <p class="description">
          Registra tu acceso institucional y crea tu perfil academico inicial.
        </p>
      </header>

      <div class="auth-tabs" role="tablist" aria-label="Acceso">
        <button class="tab" type="button" (click)="goToLogin()">Ingresar</button>
        <button class="tab is-active" type="button">Registrarse</button>
      </div>

      <form (ngSubmit)="submit()" class="auth-form">
        <div class="field-group">
          <label class="field-label" for="register-name">Nombre visible</label>
          <ion-item class="input-shell" lines="none">
            <ion-icon name="person-outline" slot="start"></ion-icon>
            <ion-input
              id="register-name"
              name="displayName"
              [(ngModel)]="displayName"
              placeholder="Tu nombre"
              required>
            </ion-input>
          </ion-item>
        </div>

        <div class="field-group">
          <label class="field-label" for="register-email">Correo institucional</label>
          <ion-item class="input-shell" lines="none">
            <ion-icon name="mail-outline" slot="start"></ion-icon>
            <ion-input
              id="register-email"
              type="email"
              name="email"
              [(ngModel)]="email"
              placeholder="usuario@universidad.edu.co"
              required>
            </ion-input>
          </ion-item>
        </div>

        <div class="field-group">
          <label class="field-label" for="register-password">Contrasena</label>
          <ion-item class="input-shell" lines="none">
            <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
            <ion-input
              id="register-password"
              [type]="showPassword ? 'text' : 'password'"
              name="password"
              [(ngModel)]="password"
              placeholder="••••••••"
              required>
            </ion-input>
            <button
              class="password-toggle"
              slot="end"
              type="button"
              [attr.aria-label]="showPassword ? 'Ocultar contrasena' : 'Mostrar contrasena'"
              (click)="togglePasswordVisibility()">
              <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
            </button>
          </ion-item>
        </div>

        <div class="field-group">
          <label class="field-label" for="register-confirm-password">Confirmar contrasena</label>
          <ion-item class="input-shell" lines="none">
            <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
            <ion-input
              id="register-confirm-password"
              [type]="showConfirmPassword ? 'text' : 'password'"
              name="confirmPassword"
              [(ngModel)]="confirmPassword"
              placeholder="••••••••"
              required>
            </ion-input>
            <button
              class="password-toggle"
              slot="end"
              type="button"
              [attr.aria-label]="showConfirmPassword ? 'Ocultar contrasena' : 'Mostrar contrasena'"
              (click)="toggleConfirmPasswordVisibility()">
              <ion-icon [name]="showConfirmPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
            </button>
          </ion-item>
        </div>

        @if (errorMessage) {
          <ion-text color="danger">
            <p class="error">{{ errorMessage }}</p>
          </ion-text>
        }

        @if (infoMessage) {
          <ion-text color="primary">
            <p class="info">{{ infoMessage }}</p>
          </ion-text>
        }

        <ion-button expand="block" type="submit" class="submit-button" [disabled]="loading">
          @if (loading) {
            <ion-spinner name="crescent"></ion-spinner>
          } @else {
            <span>Crear cuenta</span>
            <ion-icon name="arrow-forward-outline"></ion-icon>
          }
        </ion-button>
      </form>

      <footer class="card-footer">
        <div class="footer-links">
          <button type="button">Politicas de Privacidad</button>
          <button type="button">Soporte Tecnico</button>
        </div>
        <p class="footer-note">
          © 2026 Campus University Application. Todos los derechos reservados.
        </p>
      </footer>
    </div>
  </section>
</ion-content>
